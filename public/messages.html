<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes en Tiempo Real - El Rincón del Mentiroso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
    <!-- Cargar Socket.io con múltiples estrategias -->
    <script>
        // Estrategia 1: Intentar CDN primero
        function loadSocketFromCDN() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
                script.onload = () => {
                    console.log('✅ Socket.io cargado desde CDN');
                    resolve();
                };
                script.onerror = () => {
                    console.log('🔄 CDN falló, intentando servidor...');
                    reject();
                };
                document.head.appendChild(script);
            });
        }
        
        // Estrategia 2: Cargar desde servidor
        function loadSocketFromServer() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = '/socket.io/socket.io.js';
                script.onload = () => {
                    console.log('✅ Socket.io cargado desde servidor');
                    resolve();
                };
                script.onerror = () => {
                    console.error('❌ No se pudo cargar Socket.io desde servidor');
                    reject();
                };
                document.head.appendChild(script);
            });
        }
        
        // Estrategia 3: Cargar app.js y messages.js
        function loadAppScripts() {
            return new Promise((resolve) => {
                const appScript = document.createElement('script');
                appScript.src = 'app.js';
                appScript.onload = () => {
                    const messagesScript = document.createElement('script');
                    messagesScript.src = 'messages.js';
                    messagesScript.onload = resolve;
                    document.head.appendChild(messagesScript);
                };
                document.head.appendChild(appScript);
            });
        }
        
        // Ejecutar estrategias en orden
        async function initializeMessages() {
            try {
                await loadSocketFromCDN();
            } catch (e) {
                try {
                    await loadSocketFromServer();
                } catch (e2) {
                    console.error('❌ No se pudo cargar Socket.io desde ninguna fuente');
                    alert('Error: No se pudo cargar Socket.io. El servidor podría no estar funcionando.');
                    return;
                }
            }
            
            // Cargar la aplicación después de Socket.io
            await loadAppScripts();
        }
        
        // Iniciar la carga
        initializeMessages();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Mensajes en Tiempo Real</h1>
            <div class="status-bar">
                <span id="connectionStatus" class="status">🔄 Conectando...</span>
                <span id="messageCount" class="badge">📬 Sin mensajes nuevos</span>
            </div>
        </header>

        <main class="messages-main">
            <!-- Usuarios Conectados -->
            <section class="online-users-section">
                <h2>👥 Usuarios Conectados</h2>
                <div id="onlineUsers" class="online-users">
                    <div class="loading">Cargando usuarios...</div>
                </div>
            </section>

            <!-- Área de Mensajes -->
            <section class="messages-section">
                <h2>💬 Conversación</h2>
                
                <!-- Selector de Destinatario -->
                <div class="message-controls">
                    <select id="receiverSelect" class="receiver-select">
                        <option value="">Seleccionar destinatario...</option>
                    </select>
                </div>

                <!-- Contenedor de Mensajes -->
                <div id="messagesContainer" class="messages-container">
                    <div class="no-messages">Selecciona un destinatario para ver la conversación</div>
                </div>

                <!-- Formulario de Envío -->
                <form id="messageForm" class="message-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Escribe tu mensaje aquí..." 
                            maxlength="1000"
                            required
                        >
                        <button type="submit" class="send-btn">
                            📤 Enviar
                        </button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>
                <a href="/index.html">🏠 Volver al Inicio</a> |
                <a href="/signup.html">📝 Registrarse</a> |
                <a href="/login.html">🔐 Iniciar Sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
