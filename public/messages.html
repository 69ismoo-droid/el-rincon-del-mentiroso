<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes en Tiempo Real - El Rincón del Mentiroso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
    <!-- Cargar Socket.io de forma síncrona para garantizar disponibilidad -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Función para verificar y asegurar que io esté disponible
        function asegurarSocketIO() {
            return new Promise((resolve, reject) => {
                let intentos = 0;
                const maxIntentos = 50; // 5 segundos máximo
                
                const verificar = () => {
                    intentos++;
                    
                    if (typeof io !== 'undefined') {
                        console.log('✅ Socket.io disponible desde servidor');
                        resolve();
                        return;
                    }
                    
                    if (intentos >= maxIntentos) {
                        console.error('❌ Timeout: Socket.io no disponible después de 5 segundos');
                        // Cargar CDN como último recurso
                        const cdnScript = document.createElement('script');
                        cdnScript.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
                        cdnScript.onload = () => {
                            console.log('✅ Socket.io cargado desde CDN');
                            resolve();
                        };
                        cdnScript.onerror = () => {
                            console.error('❌ CDN también falló');
                            reject(new Error('No se pudo cargar Socket.io'));
                        };
                        document.head.appendChild(cdnScript);
                        return;
                    }
                    
                    // Seguir esperando
                    setTimeout(verificar, 100);
                };
                
                verificar();
            });
        }
        
        // Iniciar el proceso
        asegurarSocketIO()
            .then(() => {
                console.log('🎉 Socket.io garantizado, cargando aplicación...');
                loadApp();
            })
            .catch((error) => {
                console.error('❌ Error crítico:', error);
                alert('Error crítico: No se pudo cargar Socket.io. Recarga la página.');
            });
        
        function loadApp() {
            // Cargar app.js
            const appScript = document.createElement('script');
            appScript.src = 'app.js';
            appScript.onload = () => {
                console.log('✅ app.js cargado');
                // Cargar messages.js
                const messagesScript = document.createElement('script');
                messagesScript.src = 'messages.js';
                messagesScript.onload = () => {
                    console.log('✅ messages.js cargado');
                    console.log('🎉 Todos los scripts cargados correctamente');
                };
                messagesScript.onerror = () => {
                    console.error('❌ Error cargando messages.js');
                };
                document.head.appendChild(messagesScript);
            };
            appScript.onerror = () => {
                console.error('❌ Error cargando app.js');
            };
            document.head.appendChild(appScript);
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Mensajes en Tiempo Real</h1>
            <div class="status-bar">
                <span id="connectionStatus" class="status">🔄 Conectando...</span>
                <span id="messageCount" class="badge">📬 Sin mensajes nuevos</span>
            </div>
        </header>

        <main class="messages-main">
            <!-- Usuarios Conectados -->
            <section class="online-users-section">
                <h2>👥 Usuarios Conectados</h2>
                <div id="onlineUsers" class="online-users">
                    <div class="loading">Cargando usuarios...</div>
                </div>
            </section>

            <!-- Área de Mensajes -->
            <section class="messages-section">
                <h2>💬 Conversación</h2>
                
                <!-- Selector de Destinatario -->
                <div class="message-controls">
                    <select id="receiverSelect" class="receiver-select">
                        <option value="">Seleccionar destinatario...</option>
                    </select>
                </div>

                <!-- Contenedor de Mensajes -->
                <div id="messagesContainer" class="messages-container">
                    <div class="no-messages">Selecciona un destinatario para ver la conversación</div>
                </div>

                <!-- Formulario de Envío -->
                <form id="messageForm" class="message-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Escribe tu mensaje aquí..." 
                            maxlength="1000"
                            required
                        >
                        <button type="submit" class="send-btn">
                            📤 Enviar
                        </button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>
                <a href="/index.html">🏠 Volver al Inicio</a> |
                <a href="/signup.html">📝 Registrarse</a> |
                <a href="/login.html">🔐 Iniciar Sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
