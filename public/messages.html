<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes en Tiempo Real - El Rincón del Mentiroso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
    
    <!-- 1. CDN oficial específico para Render (HTTPS obligatorio) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <!-- 2. Validación y diagnóstico completo -->
    <script>
        // Diagnóstico completo del problema de carga
        console.log('🔍 Diagnóstico de carga de Socket.io:');
        console.log('📍 Protocolo de la página:', window.location.protocol);
        console.log('🌐 Host de la página:', window.location.host);
        console.log('🔗 URL completa:', window.location.origin);
        
        // DETECCIÓN CRÍTICA: Evitar file:///
        if (window.location.protocol === 'file:') {
            console.error('❌ ERROR CRÍTICO: Archivo abierto directamente (file://)');
            console.error('🔍 Socket.io NO FUNCIONA con archivos abiertos directamente');
            console.error('💡 Solución: Usa Live Server o un servidor web local');
            alert('ERROR: No puedes abrir este archivo directamente.\n\nUsa un servidor web local como Live Server extension en VS Code.\n\nHaz clic derecho → Open with Live Server');
            // No continuar cargando nada más
            throw new Error('Archivo abierto directamente. Usa un servidor web.');
        }
        
        // Según documentación oficial, io debería estar disponible globalmente
        if (typeof io === 'undefined') {
            console.error('❌ Error crítico: Socket.io CDN no cargado');
            console.error('🔍 Causas posibles:');
            console.error('  • Mixed Content (HTTP vs HTTPS)');
            console.error('  • CDN bloqueado por red/corporativo');
            console.error('  • Script no descargado por timeout');
            console.error('  • Problemas de CORS/HSTS');
            console.error('🔍 Intentando servidor como fallback...');
            
            // Fallback al servidor si CDN falla
            const serverScript = document.createElement('script');
            // IMPORTANTE: Usar mismo protocolo que la página para evitar Mixed Content
            const protocol = window.location.protocol;
            const host = window.location.host;
            serverScript.src = `${protocol}//${host}/socket.io/socket.io.js`;
            console.log('🔍 Fallback URL:', serverScript.src);
            console.log('🔍 Verificando que el protocolo coincida...');
            
            serverScript.onload = () => {
                console.log('✅ Socket.io cargado desde servidor (fallback)');
                // Verificación adicional
                if (typeof io === 'undefined') {
                    console.error('❌ Servidor tampoco asignó io globalmente');
                    console.error('🔍 Esto confirma que el problema es en el bundle del servidor');
                    alert('Error: Socket.io no disponible. El servidor no está asignando io globalmente.');
                } else {
                    console.log('✅ io disponible desde servidor');
                    console.log('🎉 Problema resuelto con fallback al servidor');
                }
            };
            serverScript.onerror = () => {
                console.error('❌ Servidor fallback también falló');
                console.error('🔍 Error de red o el servidor no está sirviendo el bundle');
                alert('Error: No se pudo cargar Socket.io desde ninguna fuente. Verifica la consola para más detalles.');
            };
            
            // Agregar timeout para detectar problemas de red
            setTimeout(() => {
                if (typeof io === 'undefined') {
                    console.error('❌ Timeout: Socket.io no cargado después de 10 segundos');
                    console.error('🔍 Probablemente un problema de red o bloqueo');
                    alert('Error: Timeout cargando Socket.io. Verifica tu conexión a internet.\n\nTambién limpia la caché con Ctrl+F5');
                }
            }, 10000);
            
            document.head.appendChild(serverScript);
        } else {
            console.log('✅ Socket.io cargado correctamente desde CDN oficial');
            console.log('🎉 io disponible globalmente, todo funciona');
        }
    </script>
    
    <!-- 3. Cargar los demás scripts -->
    <script src="app.js"></script>
    <script src="messages.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Mensajes en Tiempo Real</h1>
            <div class="status-bar">
                <span id="connectionStatus" class="status">🔄 Conectando...</span>
                <span id="messageCount" class="badge">📬 Sin mensajes nuevos</span>
            </div>
        </header>

        <main class="messages-main">
            <!-- Usuarios Conectados -->
            <section class="online-users-section">
                <h2>👥 Usuarios Conectados</h2>
                <div id="onlineUsers" class="online-users">
                    <div class="loading">Cargando usuarios...</div>
                </div>
            </section>

            <!-- Área de Mensajes -->
            <section class="messages-section">
                <h2>💬 Conversación</h2>
                
                <!-- Selector de Destinatario -->
                <div class="message-controls">
                    <select id="receiverSelect" class="receiver-select">
                        <option value="">Seleccionar destinatario...</option>
                    </select>
                </div>

                <!-- Contenedor de Mensajes -->
                <div id="messagesContainer" class="messages-container">
                    <div class="no-messages">Selecciona un destinatario para ver la conversación</div>
                </div>

                <!-- Formulario de Envío -->
                <form id="messageForm" class="message-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Escribe tu mensaje aquí..." 
                            maxlength="1000"
                            required
                        >
                        <button type="submit" class="send-btn">
                            📤 Enviar
                        </button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>
                <a href="/index.html">🏠 Volver al Inicio</a> |
                <a href="/signup.html">📝 Registrarse</a> |
                <a href="/login.html">🔐 Iniciar Sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
