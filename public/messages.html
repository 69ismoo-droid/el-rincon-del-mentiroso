<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes en Tiempo Real - El Rincón del Mentiroso</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="messages.css">
    <!-- Cargar Socket.io con estrategia garantizada -->
    <script>
        // Variable global para controlar la carga
        window.socketIoLoaded = false;
        window.socketIoLoading = false;
        
        // Función para cargar Socket.io
        function loadSocketIo() {
            if (window.socketIoLoaded || window.socketIoLoading) {
                return Promise.resolve();
            }
            
            window.socketIoLoading = true;
            console.log('🔄 Iniciando carga de Socket.io...');
            
            return new Promise((resolve, reject) => {
                // Estrategia 1: CDN
                const cdnScript = document.createElement('script');
                cdnScript.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
                cdnScript.onload = () => {
                    console.log('✅ Socket.io cargado desde CDN');
                    window.socketIoLoaded = true;
                    window.socketIoLoading = false;
                    resolve();
                };
                cdnScript.onerror = () => {
                    console.log('🔄 CDN falló, intentando servidor...');
                    
                    // Estrategia 2: Servidor local
                    const serverScript = document.createElement('script');
                    serverScript.src = '/socket.io/socket.io.js';
                    serverScript.onload = () => {
                        console.log('✅ Socket.io cargado desde servidor');
                        window.socketIoLoaded = true;
                        window.socketIoLoading = false;
                        resolve();
                    };
                    serverScript.onerror = () => {
                        console.error('❌ No se pudo cargar Socket.io desde ninguna fuente');
                        window.socketIoLoading = false;
                        reject(new Error('No se pudo cargar Socket.io'));
                    };
                    document.head.appendChild(serverScript);
                };
                document.head.appendChild(cdnScript);
            });
        }
        
        // Función para cargar la aplicación
        function loadApp() {
            console.log('📱 Cargando aplicación...');
            
            // Cargar app.js primero
            const appScript = document.createElement('script');
            appScript.src = 'app.js';
            appScript.onload = () => {
                console.log('✅ app.js cargado');
                
                // Luego cargar messages.js
                const messagesScript = document.createElement('script');
                messagesScript.src = 'messages.js';
                messagesScript.onload = () => {
                    console.log('✅ messages.js cargado');
                    console.log('🎉 Todos los scripts cargados');
                };
                messagesScript.onerror = () => {
                    console.error('❌ Error cargando messages.js');
                };
                document.head.appendChild(messagesScript);
            };
            appScript.onerror = () => {
                console.error('❌ Error cargando app.js');
            };
            document.head.appendChild(appScript);
        }
        
        // Inicialización secuencial
        async function initialize() {
            try {
                // 1. Cargar Socket.io primero
                await loadSocketIo();
                
                // 2. Esperar un poco para asegurar que io esté disponible
                await new Promise(resolve => setTimeout(resolve, 200));
                
                // 3. Verificar que io esté realmente disponible
                if (typeof io === 'undefined') {
                    throw new Error('Socket.io no está disponible después de la carga');
                }
                
                console.log('✅ Socket.io verificado:', typeof io);
                
                // 4. Cargar la aplicación
                loadApp();
                
            } catch (error) {
                console.error('❌ Error en inicialización:', error);
                
                // Mostrar error al usuario
                document.addEventListener('DOMContentLoaded', () => {
                    const statusEl = document.getElementById('connectionStatus');
                    if (statusEl) {
                        statusEl.textContent = '❌ Error cargando Socket.io';
                        statusEl.className = 'status error';
                    }
                });
                
                // Intentar cargar la aplicación de todos modos
                loadApp();
            }
        }
        
        // Iniciar cuando el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Mensajes en Tiempo Real</h1>
            <div class="status-bar">
                <span id="connectionStatus" class="status">🔄 Conectando...</span>
                <span id="messageCount" class="badge">📬 Sin mensajes nuevos</span>
            </div>
        </header>

        <main class="messages-main">
            <!-- Usuarios Conectados -->
            <section class="online-users-section">
                <h2>👥 Usuarios Conectados</h2>
                <div id="onlineUsers" class="online-users">
                    <div class="loading">Cargando usuarios...</div>
                </div>
            </section>

            <!-- Área de Mensajes -->
            <section class="messages-section">
                <h2>💬 Conversación</h2>
                
                <!-- Selector de Destinatario -->
                <div class="message-controls">
                    <select id="receiverSelect" class="receiver-select">
                        <option value="">Seleccionar destinatario...</option>
                    </select>
                </div>

                <!-- Contenedor de Mensajes -->
                <div id="messagesContainer" class="messages-container">
                    <div class="no-messages">Selecciona un destinatario para ver la conversación</div>
                </div>

                <!-- Formulario de Envío -->
                <form id="messageForm" class="message-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Escribe tu mensaje aquí..." 
                            maxlength="1000"
                            required
                        >
                        <button type="submit" class="send-btn">
                            📤 Enviar
                        </button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>
                <a href="/index.html">🏠 Volver al Inicio</a> |
                <a href="/signup.html">📝 Registrarse</a> |
                <a href="/login.html">🔐 Iniciar Sesión</a>
            </p>
        </footer>
    </div>
</body>
</html>
